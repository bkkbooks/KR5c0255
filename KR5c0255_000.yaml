front:
  text: 太上洞神玄妙白猿眞經眞經
  hash: sha256:55b65f2a75de1c6ff772c9c2a7fb272befe7cc52b90c536ded005b399db9e8a9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0255_HFL_000-001a, image: hfl/0576/0576-124.png}
body:
  text: 六甲神射式射而命讎射無不中射工侵靈射上利下南射北入六甲六丁天弧星君天矢尊宿聞請降臨助吾神箭隨意如神東射西中南射北入上射下應下射侵害射無不中射時命傾急急如律令此法於甲子日造式用鹿脯鹽茶酒及時果淨水好香六分金錢雲馬及黄牛血羊血猪血各一合許供養及用黄牛心黑猪肝白羊頭新鯉魚供養依混元式至三更子時左手執色袋右手執朱筆望逐方念呪四十九次取炁四十九口吹帛上筆上書式放壇供養至五更散以本色作袋盛之懸神室中逐方位依旬中取式望逐方左手執箭右手執式念呪七次取炁七口吹在箭竿式上揩拭了射之六甲符右甲寅旬中用青帛五寸書寅位呪取炁右甲辰旬中用黄帛五寸書辰位呪取炁右甲午旬中用緋帛七寸書午位呪取炁右甲申旬中用白帛四寸書申位呪取炁右甲戍旬中用黄帛五寸書戌位呪取炁右甲子旬中用皂帛六寸書子位呪取炁己上件式於甲子日夜書了罷六甲式用白薄紙方三寸三分闊六分百二十段用前呪左手執紙右手執筆呪四十九次取炁四十九口吹在紙筆上書了放壇中供養罷帛袋盛神室中如要用依前用式凡造箭日庚申日早令匠人六人造素清淨不語各占六甲方位上造於三日內要造就一百二十隻只易安箭頭直候受了於丁卯日令六匠人各安依位安箭頭入式在箭簳子中其庚申造了甲子日夜將箭在壇上供養凡懸神室中造掉子一隻上排獻了鑄青龍劔并役使鬼神採五金鑄取八石煉大丹式凡要見天上地下人間一切鬼神要欇在手下驅使令入名山洞府採八石煉大丹取五金擇金剛鑄六甲八神青龍劔須是臘日取鴟鴉晴各一對及雄黃透明者六錢墻壁朱砂一錢神室中不得令人見順日硏不住念呪西南合日黙研之自卯時至午時方位就丸作丸子當日稽首神前淨水焚香上柱望西北念呪左手執丹右手執淨水香上度過呪七遍取西北炁七口吹在丹并水中望西北淨水吞下連九日食盡九光丹第九日晚至三更焚香一炷左手執白紙二寸四分闊一寸二分右手執筆望西北念呪七次取炁七口吹在紙筆朱晝淨眼符放在淨水中安在星月下露至來日早晨日未出向天門洗左右目七遍洗足及目能視天上地下人間一切鬼神可揀擇有力量神通惺惺者一二三人使用入名山洞府採八石大丹取五金㨂擇其金剛令匠人鑄劒大丹服之一粒永得長生住世可以遠遊名山尋訪神仙也有一人披甲左手執丹右手執淨水臘日合淨服丹時呪曰靈鴟鴉神帝賜吾晴朱雄和就淨服神丹九粒服盡慧眼通明天上地下人間鬼神吾目一視悉皆現形攀拳合掌聽吾處分急急如律令服丹丸盡用淨眼符呪日天目尊神聞吾降臨神光透入淨眼符靈天上地下人間鬼神吾若一覷皆現真形急急如律令凡採大丹藥物朱砂雄黃硫黃雌黄陽起石各六兩𥐼砂鵬砂汞磂各八兩用銀半斤造作合子盛之八味更用好金一雨打作片子二箇大如合子合子底下光焰硝四兩吹入金子一片在硝上入八石次用金一片蓋次用焰硝四兩蓋頭了以合子用銀索一兩十字繫之封了合子次用金星石銀星石各一兩白土四兩白石脂二兩赤石脂二兩黄土一斤鹽四兩益母草四兩同和作泥固濟定𥋧乾取一地穴深三尺六寸放藥在内自冬至一日下手每用三十六兩炭火養之每日早晨遠爐行左玉訣右乎執劔念呪四十九次毎十五日一次呪用無灰酒一升二合遶爐澆之至立春前一日用炭六十四兩焼春日早晨開爐取出來又入土三尺六寸去火毒三日外取研揭末丸當日用淨水念呪吞之一丸要三百六十日服盡乃得住世長生不死之道故萬物不能害也固濟藥呪將雙手棒藥香上度了玉訣呪七次澆酒八石大藥吾鍊八神佑護丹爐勿令邪侵吾禀勑命輙莫縱情若有違犯斬首不停急急如律令遶爐呪吾今鍊丹吾遶爐廵八神從吾莫縱邪侵精若盜丹斬首滅形護吾丹爐帝勑鍊成急急如律令開爐呪吾鍊成丹奉請八神同共開爐勿令邪侵鬼怪精魅犯者滅形當吾爐者斬盜吾丹者迍急急如律令開爐取丹呪勑賜吾酒吾今澆爐八神尚饗常守吾爐一切精魅犯者滅盡一切厭怪盡皆辟除急急如律令出火毒法七五訣天炁八神看丹火毒散行離丹成就上儀祥雲火毒焼丹莫令盜侵敗吾丹者死犯吾丹者亡急急如律令服丹水呪清淸靈靈與道合真天一真炁昇降無停造化丹成大丹所化保我長生吾今服之昇朝玉京急急如律令凡丹成都入合子一處去土硏末糯米飯丸三百六十丸服丹首服之不得缺住一日如缺一日其功不成左手掌丹右手水念七次吹在丹水中服之造劒以戊午日令匠人造模子并金汁處不澆模子及鍊金汁處行遶看雙手玉訣念呪及汁成方住不念不遶呪曰化錬五金六申六丁八神護助青龍劔成千里萬里瞬息而臨讎八萬里取首主呈急急如律令金汁成住遶行念呪取青紙長八寸闊三寸左手紙右手筆取天門炁七口吹紙筆書式了左手式右手劒訣步斗了投在金汁中鑄劔呪曰青龍青龍真炁降臨帝有勑命龍劒立成青龍透入大騁威靈名山萬里瞬息如風急急如律令凡鑄劒揀擇金剛金六十四兩鍊鑄長三尺鐞長六寸共長三尺六寸靠鐞刃闊三寸四分尖闊一寸二分鑄成取起掛神室中青袋盛之至甲子日建爐鍊劔髙三尺六寸中心用坯劒模挿劒匣中爐内四邊去劔匣三寸六分自甲子日起首爐中鍊劒爐前排八分素食茶酒時菓供養焚香毎日用炭二十四兩錬之供養之物次不用添炭八兩熟火相生十六兩去爐中四下攅定焚香遶爐行左手玉訣右手子文呪四十九遍取天門炁四十九口吹在爐中毎日如此行遶爐一次十五日澆爐一次六十甲子一周至甲子開爐取劒丁卯日造匣如用後式遶爐呪青龍速降神道取靈透入神劔八神照明奉帝勑命衞護吾身吾執神剱同朝玉京急急如律令澆爐呪八神守護六甲六丁共衞吾劔勿放邪侵青龍神入吾劒之中滅除精怪立誅讎人急急如律令凡澆爐時左手玉訣右手無灰酒一升二合遶爐行念呪七遍取炁七口唯酒爐中澆爐了甲子開開爐呪吾今開爐八神降臨辟除精怪勿令來侵青龍常守固正同行不得離吾吾禀勑命急急如律令凡開爐左手玉訣右手子文念呪四十九遍取天門炁四十九口吹在爐中然後開爐凡造劒匣以丁卯日早晨令匠人造劒匣先焚香度過念七次取炁七口吹在木上令匠人造呪曰青龍神劒八神衞佑青龍威靈誅斬邪鬼讎人取頭千里萬里吾目瞬息急急如律令凡遊名山洞府或入萬軍之中且執劒去處合眼念呪七次不過聞風雨之聲其聲不聞開眼即到也呪曰吾欲岀遊青龍附行八神扶佑瞬息而臨千里萬里如彈指停意去立至龍神莫停急急如律令凡此劔無用常以青袋盛之懸於神室如有朝廷喜事或有神仙過徃或來相見劒響一聲親來二聲相識來三聲小灾官訟四聲邪魅精怪五聲六七聲者大灾橫死急去劔左手準備逃難避灾五假式水假右符用皂帛六寸書符皂袋盛之布以北炁木假右符用青帛八寸書符青袋盛之布以東炁火假右符用緋帛八寸書符緋袋盛之布以南炁金假右符用白帛九寸書符白袋盛之布以西炁土假右符用黄帛五寸書符黃袋盛之布以中央炁五假呪腎藏於精太一之源隂陽和合萬化生焉天象應水口口相傳帝賜吾㫖應物化生急急如律令心藏於神熒惑之精內外咸應千化萬形吾今習之水火不侵八水入火不壞吾身急急如律令肝藏於䰟䰟化炁行天象爲木發生萬形吾今習之萬木假形千顯萬隱無不順成急急如律令肺藏於𩲸𩲸曰純隂天象金曜萬假極形應物而假萬物化形吾今遠遊安永長生急急如律令脾藏於智天象鎮星一物物化隨物化形或隱吾體吾現多身吾意應化身遊幽冥急急如律令如習水假壬子日火假戊午日木假辛卯日金假癸酉日土假庚子日本日時習之焚香一炷雙手捧淨水一盞香上度過念呪四十九次取本方炁四十九口吹在水中飮之左手罡訣右手子文歩斗如此習百日夜同混元式至三更左手執本假物右手執筆念呪四十九次取炁四十九口吹在帛上筆上書式了壇上供養至五更散了隨色袋盛之懸神室中要用取一假式頭上帶之呪七次本方取炁吹渾身上步正棄一物去勿反顧以物假下形其能言語應對人如事忙不及步斗亦取一物可假下形七元式北斗七元天心之星上佐北極調理乾坤指書網紀造化我青貪巨禄文廉武破軍能除灾疫能隱吾身急急如律令凡受七星式初七日夜如混元式供養之物三更左手執帛七寸闊三寸六分七叚右手執筀北方念呪四十九次取炁四十九口吹在筆帛上書七元式列斗勢供養至五更散次日夜焚香拜了將式香上度過左手執式右手仗剱步罡先念呪七次取炁七口吹在戌劍身上步罡如習百日大神通力不可測也可小大如平地水不溺火不焚隱身匿形巨門驅摧山竭海移林聚塜乘空入地隨物化形日行萬里禄存可隱萬兵竭海平山林指物化形五行不能攘岀八幽冥文曲可改容貌易隂陽晝夜指草人成形隱身入山透水呼集鬼神廉貞可集兇獸驅使神兵起風雲霧匿形藏體岀入幽冥武曲藏百萬兵令賊軍自亂賊不見我軍人馬攝精怪鬼神萬里去如瞬息破軍可破金賊軍自亂自退藏兵馬出入軍中人不見我軍兵神鬼不聞聲也乾尊曜靈坤順内營坎震巽離艮兊神君迤還相成六十四卦神神威靈能伏萬兵賊軍自亂東西皆亡吾軍出入无人藏吾隱吾出入幽冥視吾兵者死窺吾兵者盲急急如律令此法於冬至日夜同混元式至三更左手執卦式帛右手執筆里本方念呪四十九次取炁四十九口吹在帛筆上依位壇内供養至五更散各以本色袋盛於神室中懸八方次日左手執式右手仗劒念呪七次取炁七口吹帛劔身上步罡了如此習之无不驗也次日三更焚香拜了香上度過念呪乾右符用素帛四寸白袋盛之坎右符用皂帛六寸皂袋盛之艮右符用黄帛五寸黄袋盛之震右符用青帛八寸青袋盛之巽右符用青帛八寸青袋盛之離右符用緋帛七寸緋袋威之坤右符用黃帛五寸黃袋盛之兊右符用白帛九寸白袋威之太上洞神玄妙白猿眞經
